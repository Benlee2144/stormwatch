<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera — StormWatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#00e5ff">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="icon">⚡</span>
      <span>Storm<span class="accent">Watch</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html">Command</a>
      <a href="about.html">Intel</a>
    </div>
    <div class="nav-right">
      <span class="nav-live-badge"><span class="nav-live-dot"></span> LIVE</span>
      <input type="text" class="nav-search" id="navSearch" placeholder="Search… /">
    </div>
  </nav>

  <div id="searchOverlay" class="search-overlay">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by city, state, or camera name…" autocomplete="off">
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <div id="cameraContent" class="camera-view">
    <div style="padding:0 1rem;max-width:1100px;margin:0 auto 1rem">
      <div id="breadcrumb" style="font-size:0.78rem;color:var(--text-muted)"></div>
    </div>
    <div class="camera-player" id="cameraPlayer">
      <div class="no-preview"><div class="icon">⏳</div><div>Loading…</div></div>
    </div>
    <div class="camera-info">
      <h1 id="camName" style="font-size:1.8rem;font-weight:900;letter-spacing:-0.02em"></h1>
      <div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.5rem">
        <span style="color:var(--text-secondary)" id="camLocation"></span>
        <span id="camCategory"></span>
      </div>
      <div class="meta-card" style="margin-top:1.5rem">
        <h3>⚠️ Active Alerts</h3>
        <div id="camAlerts"><div style="color:var(--text-muted);font-size:0.85rem">Checking alerts…</div></div>
      </div>
      <div class="camera-meta">
        <div class="meta-card">
          <h3>🌡️ Current Weather</h3>
          <div id="camWeather"><div style="color:var(--text-muted);font-size:0.85rem">Loading conditions…</div></div>
        </div>
        <div class="meta-card">
          <h3>📍 Location</h3>
          <div id="camMiniMap" style="height:220px;border-radius:12px;overflow:hidden"></div>
        </div>
      </div>
      <div class="camera-meta" style="margin-top:1.5rem">
        <div class="meta-card" style="grid-column:1/-1">
          <h3>📷 Nearby Cameras</h3>
          <div id="nearbyCams" class="nearby-list"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom">
      <span>⚡ StormWatch — Real-time camera monitoring across America</span>
      <span>Data sourced from state DOTs, NWS, and public feeds</span>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/cameras.js"></script>
  <script src="js/app.js"></script>
  <script src="js/weather.js"></script>
  <script>
    // Particle effect (lightweight version)
    (function() {
      const c = document.getElementById('particleCanvas');
      if (!c) return;
      const ctx = c.getContext('2d');
      let w, h, ps = [];
      function r() { w = c.width = innerWidth; h = c.height = innerHeight; }
      r(); addEventListener('resize', r);
      for (let i = 0; i < 30; i++) ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.2,vy:Math.random()*0.3+0.1,r:Math.random()+0.5,a:Math.random()*0.2+0.03});
      function d() { ctx.clearRect(0,0,w,h); ps.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,229,255,${p.a})`;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.y>h){p.y=-5;p.x=Math.random()*w}if(p.x<0||p.x>w)p.vx*=-1}); requestAnimationFrame(d); }
      d();
    })();

    document.addEventListener('DOMContentLoaded', async () => {
      initCameraView(CAMERAS);
      initSearch(CAMERAS);
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const cam = CAMERAS.find(c => c.i === id);
      if (!cam) return;
      const [conditions, alerts] = await Promise.all([
        Weather.fetchConditions(cam.la, cam.ln),
        Weather.fetchAlertsForPoint(cam.la, cam.ln)
      ]);
      Weather.renderConditions(conditions, document.getElementById('camWeather'));
      Weather.renderPointAlerts(alerts, document.getElementById('camAlerts'));
    });
  </script>
</body>
</html>
