<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minnesota Cameras — StormWatch</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="navbar-brand">
      <span class="icon">⚡</span>
      <span>Storm<span class="accent">Watch</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Map</a>
      <a href="../about.html">About</a>
    </div>
    <input type="text" class="nav-search" id="navSearch" placeholder="Search cameras… ⌘K">
  </nav>

  <div id="searchOverlay" class="search-overlay">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by city, state, or camera name…" autocomplete="off">
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <section class="state-hero">
    <h1 id="stateTitle">Minnesota</h1>
    <div class="state-stats" id="stateStats"></div>
  </section>

  <section class="section">
    <div id="stateMap"></div>
    <div id="stateCameras"></div>
  </section>

  <footer class="footer">
    <p>⚡ StormWatch — Real-time camera monitoring across America</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="../data/cameras.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initStatePage(CAMERAS, 'MN');
      initSearch(CAMERAS);
    });
  </script>
</body>
</html>
